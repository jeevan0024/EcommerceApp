---
# Ansible playbook for EcommerceApp deployment - Stage 4 as per docx
# Automates: stop tomcat → delete old WAR → copy new WAR → start tomcat → verify 200 OK

- hosts: appservers
  become: true
  tasks:

    - name: Create tomcat systemd service file
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat 9 Web Application Container
          After=network.target

          [Service]
          Type=forking
          User=tomcat
          Group=tomcat
          Environment="JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"
          ExecStart=/usr/local/apache-tomcat/bin/startup.sh
          ExecStop=/usr/local/apache-tomcat/bin/shutdown.sh

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Stop Tomcat service
      systemd:
        name: tomcat
        state: stopped
      ignore_errors: yes

    - name: Delete old EcommerceApp WAR
      file:
        path: /usr/local/apache-tomcat/webapps/EcommerceApp.war
        state: absent

    - name: Delete old EcommerceApp directory
      file:
        path: /usr/local/apache-tomcat/webapps/EcommerceApp
        state: absent

    - name: Copy new EcommerceApp WAR to Tomcat
      copy:
        src: EcommerceApp/target/EcommerceApp.war
        dest: /usr/local/apache-tomcat/webapps/EcommerceApp.war
        owner: tomcat
        group: tomcat

    - name: Start Tomcat service
      systemd:
        name: tomcat
        state: started
        enabled: yes

    - name: Wait for Tomcat to start
      pause:
        minutes: 1

    - name: Verify application returns 200 OK
      uri:
        url: "http://{{ ansible_host }}:8080/EcommerceApp/"
        status_code: 200

